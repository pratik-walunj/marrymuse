aboutTitle: A wedding atelier devoted to love, detail & effortless luxury
aboutBody: >-
  Founded in 2011, MarryMuse began with a single belief — that your wedding
  should feel as extraordinary as your love story. Today we are a full-service
  luxury planning house, orchestrating unforgettable celebrations across India
  and the world. Every mandap, every tablescape, every quiet moment is designed
  with intention, so you can be fully present in the day you'll remember forever.
